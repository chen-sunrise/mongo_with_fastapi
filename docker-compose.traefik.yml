services:
  proxy:
    image: traefik:latest
    ports:
      - "80:80"
      - "8080:8080"
    command:
      - --accesslog
      - --log
      - --entryPoints.web.transport.respondingTimeouts.writeTimeout=60
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --api
      - --api.insecure=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  backend1:
    image: backend:latest
    env_file:
      - .env
    restart: always
    command: /start.sh
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend.rule=Host(`localhost`)
      - traefik.http.services.backend.loadbalancer.server.port=80
      - traefik.http.routers.backend.entrypoints=web
      - traefik.http.routers.backend.middlewares=testheader@docker
      - traefik.http.middlewares.testheader.headers.customResponseHeaders.Server=traefik

  backend2:
    image: backend:latest
    env_file:
      - .env
    restart: always
    command: /start.sh
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    labels:
      - traefik.enable=true
      - traefik.http.services.backend.loadbalancer.server.port=80

  backend3:
    image: backend:latest
    env_file:
      - .env
    restart: always
    command: /start.sh
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    labels:
      - traefik.enable=true
      - traefik.http.services.backend.loadbalancer.server.port=80

  mongo1:
    image: mongo:7
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    volumes:
      - mongo1_data:/data/db

  mongo2:
    image: mongo:7
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    volumes:
      - mongo2_data:/data/db

  mongo3:
    image: mongo:7
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    volumes:
      - mongo3_data:/data/db

  mongo-init:
    image: mongo:7
    depends_on:
      - mongo1
      - mongo2
      - mongo3
    restart: on-failure
    entrypoint:
      - bash
      - -c
      - |
        sleep 5
        mongosh --host mongo1:27017 <<'SCRIPT'
        try {
          rs.status();
          print('Replica set already initialized');
        } catch (err) {
          rs.initiate({
            _id: 'rs0',
            members: [
              { _id: 0, host: 'mongo1:27017' },
              { _id: 1, host: 'mongo2:27017' },
              { _id: 2, host: 'mongo3:27017' }
            ]
          });
          print('Replica set initialized');
        }
        SCRIPT

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  mongo1_data:
  mongo2_data:
  mongo3_data:
  redis_data:
